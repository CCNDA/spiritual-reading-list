server {
    listen 80;
    server_name books.oursweb.net;

    root /home/ubuntu/books/public;
    index index.php index.html;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.1-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location /api/ {
        rewrite ^/api/(.*)$ /api/routes/index.php?_url=$1 last;
    }

    location ~ /api/routes/index\.php$ {
        fastcgi_pass unix:/var/run/php/php8.1-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /home/ubuntu/books/api/routes/index.php;
        include fastcgi_params;
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location ~ /\.(git|env|htaccess) {
        deny all;
    }

    access_log /var/log/nginx/books.access.log;
    error_log  /var/log/nginx/books.error.log;
}
